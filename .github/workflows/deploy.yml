name: Deploy Next.js to Hostinger

on:
  push:
    branches:
      - main  # Triggers the deployment whenever you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from GitHub to the virtual runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install all packages/dependencies
      - name: Install Dependencies
        run: npm install

      # Step 4: Run static export build (Generates the 'out' folder)
      - name: Build and Export Static Site
        run: npm run build:static

      # Step 5: Sync the 'out' directory to Hostinger via FTP
      - name: Upload files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /domains/zerothi.com/public_html/  # Uploads directly into Hostinger's domain public_html directory
          local-dir: ./out/           # Uploads the compiled 'out' directory contents
          protocol: ftp
          port: 21
          # This speeds up deployments by only uploading modified files:
          state-name: .ftp-deploy-sync-state.json
